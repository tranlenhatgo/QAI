spring.application.name=QuizzAIOnline
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Include exception messages in error responses
server.error.include-message=always

# Security is enabled with permissive defaults so existing routes stay reachable.
# Replace the wildcard with trusted domains when you are ready to lock down the API.
app.security.cors.allowed-origin-patterns=*
app.security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.security.cors.allowed-headers=*
app.security.cors.exposed-headers=Location,Content-Disposition
app.security.cors.allow-credentials=false
app.security.cors.max-age=3600

# AI Coach Webhook
coach.webhook.url=http://localhost:8000/webhook/quiz-completed
coach.webhook.api-key=${COACH_API_KEY:sc-dev-key-change-me-in-production}
coach.webhook.enabled=true

# Future auth settings can live here without changing controller routes.
# app.security.auth.jwt-issuer=
# app.security.auth.jwt-audience=

